<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shannen & Samarth</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Alex+Brush&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      height:100%;
      background:#000;
    }

    body{
      font-family:"Playfair Display", serif;
      overflow:hidden;
    }

    .scene{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .scene-home{
      background:
        linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
        url("hero.jpg") center/cover no-repeat;
      color:#fff;
    }

    .hero-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      transform:translateY(25px);
    }

    .home-center{
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .monogram{
      width:clamp(120px,18vw,220px);
      margin-bottom:28px;
    }

    .monogram img{
      width:100%;
      display:block;
    }

    .names{
      width:clamp(300px,60vw,520px);
      display:block;
      margin-bottom:36px;
    }

    .date{
      font-family:"Montserrat",sans-serif;
      font-size:15px;
      font-weight:500;
      letter-spacing:.15em;
      text-transform:uppercase;
      opacity:.9;
      margin-bottom:30px;
    }

    .pw-wrap{
      margin-top:28px;
    }

    .pw-row{
      display:flex;
      gap:12px;
    }

    .pw-input,
    .pw-btn{
      height:46px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.10);
      color:#fff;
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
    }

    .pw-input{
      width:min(300px,72vw);
      padding:0 18px;
      outline:none;
      caret-color:#fff;
    }

    .pw-input::placeholder{
      color:#fff;
      opacity:1;
    }

    .pw-btn{
      font-family:"Montserrat",sans-serif;
      font-size:11px;
      font-weight:500;
      letter-spacing:.32em;
      text-transform:uppercase;
      padding:0 22px;
      cursor:pointer;
    }

    .pw-error{
      margin-top:10px;
      min-height:14px;
      text-align:center;
      color:#fff;
      font-size:12px;
    }

    @media (max-width:768px){
      .pw-row{
        flex-direction:column;
        align-items:center;
      }

      .pw-input{
        width:min(78vw,340px);
        font-size:16px;
        text-align:center;
      }

      .pw-btn{
        width:160px;
      }
    }
  </style>
</head>

<body>

  <section class="scene scene-home">

    <div class="hero-wrap">

      <div class="home-center">

        <div class="monogram">
          <img src="monogram2.png" alt="Monogram">
        </div>

        <img
          class="names"
          src="signature1.png"
          alt="Shannen & Samarth"
        >

        <div class="date">
          27 · 02 · 27
        </div>

        <div class="pw-wrap">

          <div class="pw-row">

            <input
              id="pwInput"
              class="pw-input"
              type="password"
              placeholder="Type password here"
              autocomplete="off"
            >

            <button
              id="pwBtn"
              class="pw-btn"
            >
              Enter
            </button>

          </div>

          <div id="pwError" class="pw-error"></div>

        </div>

      </div>

    </div>

  </section>

  <script>
    const UNLOCK_KEY = "siteUnlocked";
    const GUEST_TYPE_KEY = "guestType";

    const ALL_PASSWORD = "ss2027";
    const SATURDAY_PASSWORD = "saturday2027";
    const RECEPTION_SUNDAY_PASSWORD = "sunday2027";
    const RECEPTION_PASSWORD = "reception2027";

    const pwInput = document.getElementById("pwInput");
    const pwBtn = document.getElementById("pwBtn");
    const pwError = document.getElementById("pwError");

    function unlockGuest(guestType) {
      sessionStorage.setItem(UNLOCK_KEY, "1");
      sessionStorage.setItem(GUEST_TYPE_KEY, guestType);

      window.location.href = "welcome.html";
    }

    function tryUnlock() {
      const enteredPassword = pwInput.value.trim().toLowerCase();

      if (enteredPassword === ALL_PASSWORD.toLowerCase()) {
        unlockGuest("all");
      }

      else if (enteredPassword === SATURDAY_PASSWORD.toLowerCase()) {
        unlockGuest("saturday");
      }

      else if (enteredPassword === RECEPTION_SUNDAY_PASSWORD.toLowerCase()) {
        unlockGuest("receptionSunday");
      }

      else if (enteredPassword === RECEPTION_PASSWORD.toLowerCase()) {
        unlockGuest("reception");
      }

      else {
        pwError.textContent = "Incorrect password.";
        pwInput.value = "";
        pwInput.focus();
      }
    }

    pwBtn.addEventListener("click", tryUnlock);

    pwInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        tryUnlock();
      }
    });
  </script>

</body>
</html>
